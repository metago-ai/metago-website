<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="metagoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <!-- 圆角背景 -->
  <rect width="64" height="64" rx="14" fill="#0a0a0f"/>
  <!-- 元构核心：六边形结构 -->
  <g transform="translate(32,32)">
    <!-- 外环六边形 -->
    <polygon points="0,-22 19,-11 19,11 0,22 -19,11 -19,-11" fill="none" stroke="url(#metagoGrad)" stroke-width="2"/>
    <!-- 内环六边形 -->
    <polygon points="0,-14 12,-7 12,7 0,14 -12,7 -12,-7" fill="none" stroke="url(#metagoGrad)" stroke-width="1.5" opacity="0.6"/>
    <!-- 中心点 -->
    <circle cx="0" cy="0" r="5" fill="url(#metagoGrad)"/>
    <!-- 连接线 -->
    <line x1="0" y1="-22" x2="0" y2="-14" stroke="url(#metagoGrad)" stroke-width="1.5"/>
    <line x1="19" y1="-11" x2="12" y2="-7" stroke="url(#metagoGrad)" stroke-width="1.5"/>
    <line x1="19" y1="11" x2="12" y2="7" stroke="url(#metagoGrad)" stroke-width="1.5"/>
    <line x1="0" y1="22" x2="0" y2="14" stroke="url(#metagoGrad)" stroke-width="1.5"/>
    <line x1="-19" y1="11" x2="-12" y2="7" stroke="url(#metagoGrad)" stroke-width="1.5"/>
    <line x1="-19" y1="-11" x2="-12" y2="-7" stroke="url(#metagoGrad)" stroke-width="1.5"/>
  </g>
  <!-- MetaGO 字母 M 简化 -->
  <text x="32" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" text-anchor="middle" fill="url(#metagoGrad)" opacity="0.9">M</text>
</svg>
